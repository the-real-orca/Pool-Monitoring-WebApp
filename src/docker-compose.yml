services:
  frontend:
    build: ./frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data/ai:/data/ai
      - ./data/live:/data/live
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
#    depends_on:
#      - mosquitto

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M

  mqtt2mail_pool:
    build: ./mqtt2mail/
    restart: unless-stopped
    env_file:
      - .env
#    depends_on:
#      - mosquitto
    # Optional: set timezone inside the container for local timestamps
    environment:
      TZ: ${TZ:-Europe/Vienna}
      MQTT_TOPICS: "home/H32/pool/+"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M

# for testing purposes only!
# expose the MQTT broker on a non-standard port to avoid conflicts with any local installations
  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "2883:2883"
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro


volumes:
  caddy_data:
